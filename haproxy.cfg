global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
    stats timeout 30s
    user haproxy
    group haproxy
    daemon

    # Default SSL material locations
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private

    # Modern ciphers configuration (Mozilla Recommendation / Hardening)
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    # Timeouts similar to GCP Cloud Load Balancing defaults
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 403 /etc/haproxy/errors/403.http
    errorfile 408 /etc/haproxy/errors/408.http
    errorfile 500 /etc/haproxy/errors/500.http
    errorfile 502 /etc/haproxy/errors/502.http
    errorfile 503 /etc/haproxy/errors/503.http
    errorfile 504 /etc/haproxy/errors/504.http

# ---------------------------------------------------------------------
# FRONTEND (Listeners & URL Maps)
# ---------------------------------------------------------------------
frontend http_in
    bind *:80
    mode http
    # Hardening: Permanently redirect all HTTP traffic to HTTPS
    redirect scheme https code 301 if !{ ssl_fc }

frontend https_in
    # Replace with the path to the combined Let's Encrypt certificate (privkey.pem + fullchain.pem)
    bind *:443 ssl crt /etc/haproxy/certs/site.pem
    mode http

    # ================= BASIC HARDENING / RATE LIMITING =================
    # IP tracking table to limit connections (Basic DoS Protection)
    stick-table type ip size 100k expire 30s store conn_cur,conn_rate(3s)
    tcp-request connection track-sc0 src
    # Reject connections if an IP has more than 100 connections in 3 seconds or more than 50 concurrent connections
    tcp-request connection reject if { sc_conn_rate(0) gt 100 } || { sc_conn_cur(0) gt 50 }

    # X-Forwarded-For: Ensures the backend receives the original client IP
    option forwardfor
    http-request set-header X-Forwarded-Proto https

    # ================= URL MAPS (Path-based Routing / ACLs) =================
    # Path-based routing rules definition
    acl path_api    path_beg -i /api
    acl path_static path_beg -i /static

    # Routing rules (simulating GCP Host and Path Rules)
    use_backend backend_api    if path_api
    use_backend backend_static if path_static

    # Default route
    default_backend backend_default

# ---------------------------------------------------------------------
# BACKEND SERVICES & HEALTH CHECKS
# ---------------------------------------------------------------------

# API Backend (/api)
backend backend_api
    mode http
    # leastconn is ideal for APIs where response times vary per request
    balance leastconn
    
    # Advanced Health Check: Validate 200 OK response
    option httpchk GET /api/health HTTP/1.1\r\nHost:\ api.example.com
    http-check expect status 200
    
    # inter 5s: check every 5s | fall 3: 3 failures to mark offline | rise 2: 2 successes to mark online
    server api_node_1 10.0.0.11:8080 check inter 5s fall 3 rise 2
    server api_node_2 10.0.0.12:8080 check inter 5s fall 3 rise 2

# Static content Backend (/static)
backend backend_static
    mode http
    # roundrobin distributes requests equally (ideal for static files)
    balance roundrobin
    
    option httpchk GET /healthz HTTP/1.1\r\nHost:\ static.example.com
    http-check expect status 200
    
    server static_node_1 10.0.0.21:80 check inter 5s fall 3 rise 2
    server static_node_2 10.0.0.22:80 check inter 5s fall 3 rise 2

# Default Backend (Catch-all)
backend backend_default
    mode http
    balance roundrobin
    
    option httpchk GET / HTTP/1.1\r\nHost:\ example.com
    http-check expect status 200
    
    server web_node_1 10.0.0.31:80 check inter 5s fall 3 rise 2
    server web_node_2 10.0.0.32:80 check inter 5s fall 3 rise 2
