! Configuration File for keepalived - MASTER NODE

global_defs {
    router_id LVS_HAPROXY_MASTER
    script_user root
    enable_script_security
}

# Script that checks HAProxy status
vrrp_script chk_haproxy {
    script "killall -0 haproxy" # Returns 0 if haproxy is running
    interval 2                  # Execute every 2 seconds
    weight -20                  # If script fails, reduce priority by 20
    fall 2                      # Requires 2 consecutive failures to be considered down
    rise 2                      # Requires 2 successes to be considered up
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0              # Change to the network interface assigned in Contabo (e.g. ens18, eth0)
    virtual_router_id 51        # Virtual router ID (must be the same on MASTER and BACKUP)
    priority 100                # Highest priority for the main node (100)
    advert_int 1                # Announces VRRP state every 1 second
    
    authentication {
        auth_type PASS
        auth_pass Secr3tP@ssw0rd! # Replace with a strong shared password
    }
    
    # The Floating IP (Anycast) provided by Contabo
    virtual_ipaddress {
        192.168.1.100/24        # Change to the real floating public IP of your VPS
    }

    track_script {
        chk_haproxy
    }
}
