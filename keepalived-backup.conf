! Configuration File for keepalived - BACKUP NODE

global_defs {
    router_id LVS_HAPROXY_BACKUP
    script_user root
    enable_script_security
}

# Script that checks HAProxy status
vrrp_script chk_haproxy {
    script "killall -0 haproxy"
    interval 2
    weight -20
    fall 2
    rise 2
}

vrrp_instance VI_1 {
    state BACKUP
    interface eth0              # Change to the network interface assigned in Contabo
    virtual_router_id 51        # Must match exactly with MASTER's virtual_router_id
    priority 90                 # Lower priority for the secondary node (90)
    advert_int 1
    
    authentication {
        auth_type PASS
        auth_pass Secr3tP@ssw0rd! # Replace with the same password used in MASTER
    }
    
    virtual_ipaddress {
        192.168.1.100/24        # Change to the real floating public IP of your VPS
    }

    track_script {
        chk_haproxy
    }
}
