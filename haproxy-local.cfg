global
    log stdout format raw local0
    maxconn 2000

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

# ---------------------------------------------------------------------
# FRONTEND (Listeners & URL Maps) - LOCAL TESTING
# ---------------------------------------------------------------------
frontend http_in
    bind *:80
    mode http

    # ================= URL MAPS (Path-based Routing / ACLs) =================
    acl path_api    path_beg -i /api
    acl path_static path_beg -i /static

    # Reglas de enrutamiento
    use_backend backend_api    if path_api
    use_backend backend_static if path_static

    # Ruta por defecto
    default_backend backend_default

# ---------------------------------------------------------------------
# BACKEND SERVICES - LOCAL TESTING
# ---------------------------------------------------------------------
backend backend_api
    mode http
    balance leastconn
    # Usamos los nombres de servicio de Docker Compose en lugar de IPs
    server api_node_1 api1:80 check
    server api_node_2 api2:80 check

backend backend_static
    mode http
    balance roundrobin
    server static_node_1 static1:80 check
    server static_node_2 static2:80 check

backend backend_default
    mode http
    balance roundrobin
    server web_node_1 web1:80 check
